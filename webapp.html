<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Joke Generator</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #e8f4f8;
            color: #1a1a2e;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        #navbar {
            background-color: #1a3a5c;
            padding: 10px;
        }

        #navbar a {
            color: #ffffff;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        #navbar a:hover {
            text-decoration: underline;
        }

        #header {
            background-color: #1a3a5c;
            color: #ffffff;
            padding: 40px 20px;
        }

        #header h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        #header p {
            font-size: 1.1rem;
        }

        #app {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #joke-box {
            font-size: 1.3rem;
            color: #1a3a5c;
            margin: 20px 0;
            min-height: 80px;
            padding: 20px;
            background-color: #e8f4f8;
            border-radius: 8px;
        }

        #punchline-box {
            font-size: 1.2rem;
            color: #333333;
            margin: 10px 0;
            min-height: 60px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 8px;
            display: none;
        }

        button {
            background-color: #1a3a5c;
            color: #ffffff;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background-color: #0d3b6e;
        }

        #score {
            font-size: 1rem;
            color: #555555;
            margin-top: 15px;
        }

        #footer {
            background-color: #1a3a5c;
            color: #ffffff;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div id="navbar">
        <a href="index.html">Home</a> |
        <a href="scratch.html">Back to Scratch Page</a>
    </div>

    <div id="header">
        <h1>⛷️ Ski Joke Generator</h1>
        <p>Need a laugh on the chairlift? We've got you covered.</p>
    </div>

    <div id="app">
        <p>Click the button to get a ski joke!</p>

        <div id="joke-box">Hit the button to hear a joke!</div>
        <div id="punchline-box"></div>

        <button onclick="showJoke()">Tell Me a Joke! 🎿</button>
        <button onclick="showPunchline()">Show Punchline 😂</button>
        <button onclick="rateJoke('good')">👍 Good One!</button>
        <button onclick="rateJoke('bad')">👎 That Was Bad</button>

        <div id="score">
            Good jokes: <span id="good">0</span> |
            Bad jokes: <span id="bad">0</span>
        </div>
    </div>

    <div id="footer">
        <p>Copyright &copy; Corbin Szenegeto 2026</p>
    </div>

    <script>
        const jokes = [
            { setup: "Why don't skiers ever get lost?", punchline: "Because they always follow the slope!" },
            { setup: "What do you call a snowman on skis?", punchline: "An avalanche waiting to happen!" },
            { setup: "Why did the skier bring a map?", punchline: "Because he kept going off piste!" },
            { setup: "What do skiers order at a restaurant?", punchline: "Whatever is on the slalom-menu!" },
            { setup: "Why was the ski instructor so calm?", punchline: "Because he knew how to take things one slope at a time!" },
            { setup: "What do you call a slow skier?", punchline: "A slopepoke!" },
            { setup: "Why did the skier wear two pairs of pants?", punchline: "In case he got a hole in one!" },
            { setup: "What's a skier's favorite type of music?", punchline: "Heavy powder metal!" },
            { setup: "Why do skiers make great friends?", punchline: "They always help you when you're going downhill!" },
            { setup: "What did the ski slope say to the skier?", punchline: "Nothing, it just gave him a cold shoulder!" }
        ];

        let currentJoke = null;
        let goodCount = 0;
        let badCount = 0;

        function showJoke() {
            const randomIndex = Math.floor(Math.random() * jokes.length);
            currentJoke = jokes[randomIndex];
            document.getElementById('joke-box').innerText = currentJoke.setup;
            document.getElementById('punchline-box').style.display = 'none';
            document.getElementById('punchline-box').innerText = '';
        }

        function showPunchline() {
            if (currentJoke) {
                document.getElementById('punchline-box').innerText = currentJoke.punchline;
                document.getElementById('punchline-box').style.display = 'block';
            } else {
                alert('Get a joke first!');
            }
        }

        function rateJoke(rating) {
            if (!currentJoke) {
                alert('Get a joke first!');
                return;
            }
            if (rating === 'good') {
                goodCount++;
                document.getElementById('good').innerText = goodCount;
            } else {
                badCount++;
                document.getElementById('bad').innerText = badCount;
            }
        }
    </script>

</body>
</html>
